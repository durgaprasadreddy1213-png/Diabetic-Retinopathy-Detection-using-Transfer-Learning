<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Prediction - DR Classification</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <header class="top-bar">
      <div class="logo">Diabetic Retinopathy Classification</div>
      <nav>
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('prediction_page') }}">Prediction</a>
      </nav>
    </header>

    <main class="container">

      <section class="card">
        <h2>Upload Fundus Image</h2>

        <form method="post" enctype="multipart/form-data">
          <input type="file" name="image" accept=".jpg,.jpeg,.png" required>
          <br><br>
          <button type="submit" class="btn">Submit</button>
        </form>

        {% if prediction %}
          <div class="result">
            <h3>Diabetic Retinopathy Classification is:</h3>
            <p class="prediction">{{ prediction }}</p>
          </div>
        {% endif %}

      </section>

    </main>
  </body>
</html>
